<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jyotish AI - Vedic Astrology Predictions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 font-['Inter'] text-white">

    <!-- Stars background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="stars"></div>
    </div>

    <div class="relative min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md">

            <!-- Logo / Header -->
            <div class="text-center mb-8">
                <div class="text-5xl mb-3">&#9790;</div>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-amber-400 to-orange-400 bg-clip-text text-transparent">
                    Jyotish AI
                </h1>
                <p class="text-gray-400 mt-2">Vedic Astrology Powered by AI</p>
            </div>

            <!-- Auth Card -->
            <div class="bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl p-8">

                <!-- Tabs -->
                <div class="flex mb-6 bg-white/5 rounded-lg p-1">
                    <button id="tab-login" onclick="switchTab('login')"
                            class="flex-1 py-2.5 text-sm font-medium rounded-md transition-all
                                   bg-amber-500/20 text-amber-400">
                        Login
                    </button>
                    <button id="tab-register" onclick="switchTab('register')"
                            class="flex-1 py-2.5 text-sm font-medium rounded-md transition-all
                                   text-gray-400 hover:text-white">
                        Register
                    </button>
                </div>

                <!-- Error message -->
                <div id="auth-error" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm"></div>

                <!-- Login Form -->
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1.5">Email</label>
                            <input type="email" id="login-email" required
                                   class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg
                                          text-white placeholder-gray-500 focus:outline-none focus:border-amber-500/50
                                          transition-colors"
                                   placeholder="your@email.com">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1.5">Password</label>
                            <input type="password" id="login-password" required
                                   class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg
                                          text-white placeholder-gray-500 focus:outline-none focus:border-amber-500/50
                                          transition-colors"
                                   placeholder="Enter your password">
                        </div>
                        <button type="submit" id="login-btn"
                                class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500
                                       hover:from-amber-400 hover:to-orange-400 text-white font-semibold
                                       rounded-lg transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                            Login
                        </button>
                    </div>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1.5">Full Name</label>
                            <input type="text" id="reg-name" required
                                   class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg
                                          text-white placeholder-gray-500 focus:outline-none focus:border-amber-500/50
                                          transition-colors"
                                   placeholder="Your full name">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1.5">Email</label>
                            <input type="email" id="reg-email" required
                                   class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg
                                          text-white placeholder-gray-500 focus:outline-none focus:border-amber-500/50
                                          transition-colors"
                                   placeholder="your@email.com">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1.5">Password</label>
                            <input type="password" id="reg-password" required minlength="6"
                                   class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg
                                          text-white placeholder-gray-500 focus:outline-none focus:border-amber-500/50
                                          transition-colors"
                                   placeholder="Min 6 characters">
                        </div>
                        <button type="submit" id="reg-btn"
                                class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500
                                       hover:from-amber-400 hover:to-orange-400 text-white font-semibold
                                       rounded-lg transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                            Create Account
                        </button>
                    </div>
                </form>
            </div>

            <p class="text-center text-gray-500 text-xs mt-6">
                Personalized Vedic astrology predictions using precise planetary calculations
            </p>
        </div>
    </div>

    <script>
        // Redirect to dashboard if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const regForm = document.getElementById('register-form');
            const loginTab = document.getElementById('tab-login');
            const regTab = document.getElementById('tab-register');
            const errorEl = document.getElementById('auth-error');
            errorEl.classList.add('hidden');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                regForm.classList.add('hidden');
                loginTab.className = loginTab.className.replace('text-gray-400 hover:text-white', '').trim();
                loginTab.classList.add('bg-amber-500/20', 'text-amber-400');
                regTab.classList.remove('bg-amber-500/20', 'text-amber-400');
                regTab.classList.add('text-gray-400', 'hover:text-white');
            } else {
                regForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                regTab.className = regTab.className.replace('text-gray-400 hover:text-white', '').trim();
                regTab.classList.add('bg-amber-500/20', 'text-amber-400');
                loginTab.classList.remove('bg-amber-500/20', 'text-amber-400');
                loginTab.classList.add('text-gray-400', 'hover:text-white');
            }
        }

        function showError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.textContent = 'Logging in...';
            btn.disabled = true;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('login-email').value,
                        password: document.getElementById('login-password').value,
                    }),
                });
                const data = await res.json();
                if (!res.ok) {
                    showError(data.detail || 'Login failed');
                    return;
                }
                localStorage.setItem('token', data.access_token);
                window.location.href = '/dashboard';
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                btn.textContent = 'Login';
                btn.disabled = false;
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            btn.textContent = 'Creating account...';
            btn.disabled = true;
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        full_name: document.getElementById('reg-name').value,
                        email: document.getElementById('reg-email').value,
                        password: document.getElementById('reg-password').value,
                    }),
                });
                const data = await res.json();
                if (!res.ok) {
                    showError(data.detail || 'Registration failed');
                    return;
                }
                localStorage.setItem('token', data.access_token);
                window.location.href = '/dashboard';
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
